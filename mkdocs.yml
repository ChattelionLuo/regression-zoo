site_name: Linear Model Arena
site_description: A comprehensive, faithful encyclopedia of concrete algorithms (solvers) for Generalized Linear Models.
site_author: GLM Arena
repo_url: "https://github.com/ChattelionLuo/regression-zoo"
repo_name: ChattelionLuo/regression-zoo
site_url: "https://ChattelionLuo.github.io/regression-zoo/"
copyright: "GLM Algorithm Arena — a faithful encyclopedia of GLM solvers."
use_directory_urls: true

theme:
  name: material
  font: false  # self-hosted Alright Sans via docs/css/extra.css
  favicon: img/logo.svg
  icon:
    logo: material/chart-bell-curve-cumulative
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.integrate
    - toc.follow

markdown_extensions:
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/extra.css

plugins:
  - search

nav:
  - Home: index.md
  - Framework:
      - Notation & framework: framework/notation.md
      - Taxonomy: framework/taxonomy.md
      - Card schema: framework/card-schema.md
  - Algorithms:
      - Catalogue: algorithms/index.md
      - Classical:
          - Ordinary Least Squares: algorithms/ols.md
          - Ridge Regression: algorithms/ridge.md
          - GLM via IRLS: algorithms/glm-irls.md
      - Penalized (batch):
          - Lasso (coordinate descent): algorithms/lasso-cd.md
          - Elastic Net: algorithms/elastic-net.md
          - Adaptive Lasso: algorithms/adaptive-lasso.md
          - SCAD (LLA): algorithms/scad-lla.md
          - MCP (coordinate descent): algorithms/mcp-cd.md
          - Group Lasso: algorithms/group-lasso.md
          - Fused Lasso: algorithms/fused-lasso.md
      - Path / homotopy:
          - LARS: algorithms/lars.md
      - First-order / proximal:
          - ISTA: algorithms/ista.md
          - FISTA: algorithms/fista.md
      - High-dimensional inference:
          - Debiased Lasso: algorithms/debiased-lasso.md
          - Decorrelated Score: algorithms/decorrelated-score.md
      - Online / streaming:
          - SGD: algorithms/sgd.md
          - Implicit SGD: algorithms/implicit-sgd.md
          - AdaGrad: algorithms/adagrad.md
          - FOBOS: algorithms/fobos.md
          - RDA: algorithms/rda.md
          - Truncated Gradient: algorithms/truncated-gradient.md
          - Renewable GLM: algorithms/renewable-glm.md
  - Arena:
      - Overview: arena/index.md
      - Real datasets: arena/real-datasets.md
      - Synthetic — regression: arena/synthetic-regression.md
      - Synthetic — logistic: arena/synthetic-logistic.md
